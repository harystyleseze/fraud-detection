services:
  # Development — hot-reload, SQLite, source volume-mounted
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: .env
    restart: unless-stopped

  # Production — PostgreSQL backend, optimised multi-stage image
  db:
    profiles: [prod]
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fraud
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://fraud:fraud@db:5432/fraud
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
